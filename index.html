<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Art Generator</title>
    <!-- Library jsPDF untuk ekspor PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Hubungkan ke file CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="canvas-container">
        <!-- Resolusi internal canvas HD -->
        <canvas id="artCanvas" width="1000" height="1000"></canvas>
    </div>

    <div class="controls">
        <h2>String Art Generator</h2>
        
        <div class="control-group">
            <label>Upload Gambar (JPG/PNG)</label>
            <input type="file" id="imageInput" accept="image/png, image/jpeg">
        </div>

        <div class="control-group">
            <label>Jumlah Paku (Nails) <span class="val-display" id="nailsVal">250</span></label>
            <input type="range" id="nailsCount" min="100" max="400" value="250" step="10">
        </div>

        <div class="control-group">
            <label>Jumlah Garis (Lines) <span class="val-display" id="linesVal">3000</span></label>
            <input type="range" id="linesCount" min="500" max="6000" value="3000" step="100">
        </div>

        <div class="control-group">
            <label>Transparansi Benang <span class="val-display" id="opacityVal">0.1</span></label>
            <input type="range" id="lineOpacity" min="0.02" max="0.3" value="0.1" step="0.01">
        </div>

        <button id="btnGenerate" disabled>Mulai Proses</button>

        <div class="status" id="statusText">Pilih gambar untuk memulai...</div>

        <hr style="border-color: var(--border); margin: 10px 0;">
        
        <label>Ekspor Hasil:</label>
        <div class="export-group">
            <button id="btnPng" disabled>PNG</button>
            <button id="btnPdf" disabled>PDF</button>
            <button id="btnCsv" disabled>CSV</button>
        </div>
    </div>
</div>

<!-- Hubungkan ke file JavaScript -->
<script src="script.js"></script>
</body>
</html>
