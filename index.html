<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Art Pro Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #a78bfa;
            --text: #f1f5f9;
            --border: #334155;
        }

        /* 1. Reset & Full Screen Lock */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden; /* Mencegah scroll seluruh halaman */
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 350px; /* Sidebar lebih ramping */
            width: 100%;
            height: 100%;
        }

        /* AREA KIRI: VIEWPORT CANVAS */
        .main-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
            position: relative;
            overflow: hidden;
        }

        .canvas-container {
            max-width: 95%;
            max-height: 95%;
            aspect-ratio: 1/1;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: move;
            border: 3px solid var(--accent);
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* AREA KANAN: SIDEBAR CERDAS */
        .sidebar {
            background: var(--card);
            border-left: 1px solid var(--border);
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 10px; /* Jarak antar elemen diperkecil */
            height: 100%;
        }

        h2 { color: var(--accent); font-size: 1.3rem; margin-bottom: -5px; }
        .hint { font-size: 0.75rem; color: #94a3b8; line-height: 1.2; }

        .group { 
            background: #0f172a; 
            padding: 10px; 
            border-radius: 10px; 
            border: 1px solid var(--border); 
        }

        label { font-size: 0.75rem; color: #94a3b8; display: block; margin-bottom: 4px; }
        .val { float: right; color: var(--accent); font-weight: bold; font-size: 0.8rem; }

        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; height: 15px; }
        input[type="file"] { font-size: 0.7rem; width: 100%; color: #94a3b8; }
        
        .btn-primary {
            background: var(--accent);
            color: #0f172a;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .btn-primary:hover { transform: translateY(-1px); opacity: 0.9; }
        .btn-primary:disabled { background: #444; color: #888; cursor: not-allowed; }

        /* Bagian Download (Fixed di Bawah) */
        .export-section {
            margin-top: auto; /* Memaksa bagian ini ke paling bawah */
            border-top: 1px solid var(--border);
            padding-top: 10px;
        }

        .export-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 8px; }
        .btn-sec { background: #334155; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
        .btn-sec:hover { background: #475569; }

        #status { text-align: center; color: var(--accent); font-size: 0.8rem; margin-top: 5px; min-height: 1.2em; }

        .instr-tag {
            position: absolute;
            top: 15px;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #ccc;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="main-view">
        <div class="instr-tag">Navigasi: Geser foto di dalam lingkaran</div>
        <div class="canvas-container" id="canvasWrapper">
            <canvas id="artCanvas" width="1000" height="1000"></canvas>
        </div>
    </div>

    <div class="sidebar">
        <h2>String Art Gen</h2>
        <p class="hint">Atur paku dan tarik benang secara digital.</p>

        <div class="group">
            <label>1. Pilih Foto</label>
            <input type="file" id="imgInput" accept="image/*">
        </div>

        <div class="group">
            <label>Zoom Foto <span class="val" id="zVal">1.0x</span></label>
            <input type="range" id="imgZoom" min="0.5" max="3" value="1" step="0.1">
        </div>

        <div class="group">
            <label>Jumlah Paku <span class="val" id="nVal">250</span></label>
            <input type="range" id="nails" min="100" max="400" value="250">
        </div>

        <div class="group">
            <label>Jumlah Garis <span class="val" id="lVal">3000</span></label>
            <input type="range" id="lines" min="500" max="6000" value="3000" step="100">
        </div>

        <div class="group">
            <label>Ketebalan Benang <span class="val" id="oVal">0.2</span></label>
            <input type="range" id="opacity" min="0.05" max="0.5" value="0.2" step="0.01">
        </div>

        <button id="btnStart" class="btn-primary" disabled>Mulai Generate</button>
        <div id="status">Upload gambar...</div>

        <div class="export-section">
            <label>Ekspor Hasil (Hitam Putih):</label>
            <div class="export-grid">
                <button id="expPng" class="btn-sec">PNG HD</button>
                <button id="expPdf" class="btn-sec">PDF</button>
                <button id="expCsv" class="btn-sec">Urutan</button>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('artCanvas');
    const ctx = canvas.getContext('2d', {willReadFrequently: true});
    const status = document.getElementById('status');
    const SIZE = 1000;
    const RADIUS = SIZE/2 - 8;

    let imgObj = null;
    let isWorking = false;
    let pinSeq = [];
    let pinPos = [];

    // Variabel Geser & Zoom
    let offsetX = 0, offsetY = 0;
    let scaleBase = 1, userZoom = 1;
    let isDragging = false, startX, startY;

    const updateVal = (id, val) => document.getElementById(id).innerText = val;
    
    document.getElementById('imgZoom').oninput = e => { 
        userZoom = parseFloat(e.target.value); 
        updateVal('zVal', userZoom+'x'); 
        renderPreview(); 
    };
    document.getElementById('nails').oninput = e => updateVal('nVal', e.target.value);
    document.getElementById('lines').oninput = e => updateVal('lVal', e.target.value);
    document.getElementById('opacity').oninput = e => updateVal('oVal', e.target.value);

    document.getElementById('imgInput').onchange = e => {
        const reader = new FileReader();
        reader.onload = event => {
            imgObj = new Image();
            imgObj.onload = () => {
                scaleBase = Math.max(SIZE/imgObj.width, SIZE/imgObj.height);
                offsetX = (SIZE - imgObj.width * scaleBase) / 2;
                offsetY = (SIZE - imgObj.height * scaleBase) / 2;
                renderPreview();
                document.getElementById('btnStart').disabled = false;
                status.innerText = "Siap. Silakan geser foto.";
            };
            imgObj.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function renderPreview() {
        if(!imgObj) return;
        ctx.clearRect(0,0,SIZE,SIZE);
        ctx.fillStyle = "white"; ctx.fillRect(0,0,SIZE,SIZE);
        ctx.save();
        ctx.filter = 'grayscale(100%) contrast(115%) brightness(105%)';
        ctx.drawImage(imgObj, offsetX, offsetY, imgObj.width * scaleBase * userZoom, imgObj.height * scaleBase * userZoom);
        ctx.restore();
        ctx.globalCompositeOperation = 'destination-in';
        ctx.beginPath(); ctx.arc(SIZE/2, SIZE/2, RADIUS, 0, Math.PI*2); ctx.fill();
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = "rgba(255,255,255,0.4)";
        ctx.beginPath(); ctx.arc(SIZE/2, SIZE/2, RADIUS, 0, Math.PI*2); ctx.fill();
    }

    const wrapper = document.getElementById('canvasWrapper');
    wrapper.onmousedown = e => { if(isWorking) return; isDragging = true; startX = e.clientX - offsetX; startY = e.clientY - offsetY; };
    window.onmousemove = e => {
        if(!isDragging || isWorking) return;
        offsetX = e.clientX - startX; offsetY = e.clientY - startY;
        renderPreview();
    };
    window.onmouseup = () => isDragging = false;

    async function startProcess() {
        if(!imgObj || isWorking) return;
        isWorking = true;
        document.getElementById('btnStart').disabled = true;

        const nNails = parseInt(document.getElementById('nails').value);
        const nLines = parseInt(document.getElementById('lines').value);
        const alpha = parseFloat(document.getElementById('opacity').value);

        const tC = document.createElement('canvas'); tC.width = SIZE; tC.height = SIZE;
        const tCtx = tC.getContext('2d');
        tCtx.fillStyle = "white"; tCtx.fillRect(0,0,SIZE,SIZE);
        tCtx.filter = 'grayscale(100%) contrast(120%)';
        tCtx.drawImage(imgObj, offsetX, offsetY, imgObj.width * scaleBase * userZoom, imgObj.height * scaleBase * userZoom);
        
        const data = tCtx.getImageData(0,0,SIZE,SIZE).data;
        let pixels = new Float32Array(SIZE*SIZE);
        for(let i=0; i<data.length; i+=4) pixels[i/4] = 255 - (data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114);

        pinPos = [];
        for(let i=0; i<nNails; i++) {
            const ang = (i*2*Math.PI)/nNails;
            pinPos.push({ x: Math.round(SIZE/2 + RADIUS * Math.cos(ang)), y: Math.round(SIZE/2 + RADIUS * Math.sin(ang)) });
        }

        ctx.fillStyle = "white"; ctx.fillRect(0,0,SIZE,SIZE);
        ctx.strokeStyle = `rgba(0,0,0,${alpha})`; ctx.lineWidth = 1;

        let cur = 0; pinSeq = [0];
        for(let l=0; l<nLines; l++) {
            let best = -1, maxS = -1;
            for(let i=0; i<nNails; i++) {
                if(Math.abs(i - cur) < 15) continue;
                const score = calculateScore(pixels, pinPos[cur], pinPos[i]);
                if(score > maxS) { maxS = score; best = i; }
            }
            if(best === -1) break;
            drawAndSubtract(pixels, pinPos[cur], pinPos[best]);
            ctx.beginPath(); ctx.moveTo(pinPos[cur].x, pinPos[cur].y); ctx.lineTo(pinPos[best].x, pinPos[best].y); ctx.stroke();
            cur = best; pinSeq.push(cur);
            if(l % 70 === 0) { status.innerText = `Proses: ${Math.round((l/nLines)*100)}%`; await new Promise(r => setTimeout(r, 0)); }
        }
        status.innerText = "Selesai!";
        isWorking = false; document.getElementById('btnStart').disabled = false;
    }

    function calculateScore(pixels, p1, p2) {
        let s = 0, c = 0;
        const pts = bresenham(p1.x, p1.y, p2.x, p2.y);
        for(let p of pts) { s += pixels[p]; c++; }
        return s/c;
    }
    function drawAndSubtract(pixels, p1, p2) {
        const pts = bresenham(p1.x, p1.y, p2.x, p2.y);
        for(let p of pts) pixels[p] = Math.max(0, pixels[p] - 95);
    }
    function bresenham(x0, y0, x1, y1) {
        let pts = [];
        let dx = Math.abs(x1-x0), sx = x0<x1 ? 1 : -1;
        let dy = -Math.abs(y1-y0), sy = y0<y1 ? 1 : -1;
        let err = dx+dy, e2;
        while(true) {
            pts.push(y0*SIZE + x0);
            if(x0===x1 && y0===y1) break;
            e2 = 2*err;
            if(e2>=dy) { err+=dy; x0+=sx; }
            if(e2<=dx) { err+=dx; y0+=sy; }
        }
        return pts;
    }

    document.getElementById('btnStart').onclick = startProcess;
    document.getElementById('expPng').onclick = () => {
        const link = document.createElement('a');
        link.download = 'stringart-result.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    };
    document.getElementById('expCsv').onclick = () => {
        let csv = "Urutan,Paku_ID\n" + pinSeq.map((p,i)=>`${i+1},${p}`).join("\n");
        const blob = new Blob([csv], {type:'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'urutan-benang.csv'; a.click();
    };
    document.getElementById('expPdf').onclick = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("String Art Guide", 15, 15);
        doc.addImage(canvas.toDataURL('image/jpeg', 1.0), 'JPEG', 15, 25, 180, 180);
        doc.save('guide.pdf');
    };
</script>
</body>
</html>
